<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Sinh viên - Đăng nhập</title>
    <style>
        /* CSS cho màn hình Loading */
#loading-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255, 255, 255, 0.8);
    display: none; /* Mặc định ẩn đi */
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.spinner {
    width: 50px; height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a365d; margin-bottom: 8px; }
        p { color: #718096; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #2b6cb0; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; transition: background 0.2s; }
        button:hover { background: #2c5282; }
        #error-msg { color: #e53e3e; font-size: 14px; margin-top: 12px; min-height: 20px; }
        .hint { color: #718096; font-size: 12px; margin-top: 16px; line-height: 1.5; }
    </style>
</head>
<body>
<div id="loading-overlay">
    <div class="spinner"></div>
</div>
<div class="login-card">
    <h2>🔒 CỔNG ĐĂNG NHẬP</h2>
    <p>Hệ thống Quản lý Đào tạo Cloud-Native</p>

    <input type="email" id="email" placeholder="Email trường cấp">
    <input type="password" id="password" placeholder="Mật khẩu">

    <button onclick="handleLogin()">Đăng Nhập</button>

    <div id="error-msg"></div>
    <p class="hint">Tài khoản do Phòng Đào tạo cấp.<br>Liên hệ quản trị viên nếu chưa có tài khoản.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script>
    async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    // Hiển thị vòng xoay Loading
    document.getElementById('loading-overlay').style.display = 'flex';

    try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        // Tắt vòng xoay Loading khi có kết quả
        document.getElementById('loading-overlay').style.display = 'none';

        if (error) {
            // Dùng SweetAlert2 báo lỗi thay vì alert()
            Swal.fire({
                icon: 'error',
                title: 'Đăng nhập thất bại',
                text: 'Email hoặc mật khẩu không đúng!',
                confirmButtonColor: '#d33'
            });
        } else {
            // Dùng SweetAlert2 báo thành công
            Swal.fire({
                icon: 'success',
                title: 'Tuyệt vời!',
                text: 'Đăng nhập thành công',
                showConfirmButton: false,
                timer: 1500 // Tự động đóng sau 1.5 giây
            }).then(() => {
                // Điều hướng dựa vào email (như logic cũ)
                if (email.startsWith('admin')) {
                    window.location.href = "admin.html";
                } else if (email.startsWith('gv.') || email.includes('teacher')) {
                    window.location.href = "teacher.html";
                } else {
                    window.location.href = "student.html";
                }
            });
        }
    } catch (err) {
        document.getElementById('loading-overlay').style.display = 'none';
        Swal.fire({ icon: 'error', title: 'Lỗi hệ thống', text: 'Vui lòng thử lại sau!' });
    }
}
</script>

</body>
</html>
