<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for disabled input and cursor */
        .input-disabled {
            background-color: #f3f4f6; /* Tailwind gray-100 */
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">

    <!-- Profile Settings Component -->
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-xl p-6 md:p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Cài đặt Tài khoản</h1>

        <div class="flex flex-col md:flex-row md:space-x-8 space-y-8 md:space-y-0">
            <!-- Khối 1: Thông tin cá nhân (Read-only) -->
            <div class="md:w-1/2 p-6 bg-gray-50 rounded-lg shadow-inner">
                <h2 class="text-2xl font-semibold text-gray-700 mb-6">Thông tin cá nhân</h2>
                
                <div class="flex flex-col items-center mb-6">
                    <!-- Avatar -->
                    <div class="w-24 h-24 rounded-full bg-blue-200 flex items-center justify-center text-blue-800 text-4xl font-bold mb-3">
                        <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>
                    </div>
                    <!-- Name and Role -->
                    <h3 class="text-xl font-bold text-gray-800">Nguyễn Văn A</h3>
                    <p class="text-blue-600 font-medium">Sinh viên</p> <!-- Hoặc "Giảng viên" -->
                </div>

                <div class="space-y-4">
                    <div>
                        <label for="profileId" class="block text-sm font-medium text-gray-700">Mã số (ID)</label>
                        <input type="text" id="profileId" value="SV2023001" disabled readonly class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 input-disabled">
                    </div>
                    <div>
                        <label for="profileFullName" class="block text-sm font-medium text-gray-700">Họ và Tên</label>
                        <input type="text" id="profileFullName" value="Nguyễn Văn A" disabled readonly class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 input-disabled">
                    </div>
                    <div>
                        <label for="profileMajor" class="block text-sm font-medium text-gray-700">Khoa/Chuyên ngành</label>
                        <input type="text" id="profileMajor" value="Công nghệ thông tin" disabled readonly class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 input-disabled">
                    </div>
                    <div>
                        <label for="profileEmail" class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" id="profileEmail" value="nguyenvana@example.com" disabled readonly class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 input-disabled">
                    </div>
                </div>
            </div>

            <!-- Khối 2: Đổi Mật khẩu -->
            <div class="md:w-1/2 p-6 bg-white rounded-lg shadow">
                <h2 class="text-2xl font-semibold text-gray-700 mb-6">Đổi Mật khẩu</h2>
                
                <div class="space-y-4">
                    <!-- Mật khẩu hiện tại -->
                    <div>
                        <label for="currentPassword" class="block text-sm font-medium text-gray-700">Mật khẩu hiện tại</label>
                        <div class="relative mt-1">
                            <input type="password" id="currentPassword" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 pr-10 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                            <button type="button" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500" onclick="togglePasswordVisibility('currentPassword')">
                                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" data-visible="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Mật khẩu mới -->
                    <div>
                        <label for="newPassword" class="block text-sm font-medium text-gray-700">Mật khẩu mới</label>
                        <div class="relative mt-1">
                            <input type="password" id="newPassword" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 pr-10 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                            <button type="button" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500" onclick="togglePasswordVisibility('newPassword')">
                                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" data-visible="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Nhập lại mật khẩu mới -->
                    <div>
                        <label for="confirmNewPassword" class="block text-sm font-medium text-gray-700">Nhập lại mật khẩu mới</label>
                        <div class="relative mt-1">
                            <input type="password" id="confirmNewPassword" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 pr-10 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                            <button type="button" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500" onclick="togglePasswordVisibility('confirmNewPassword')">
                                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" data-visible="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="mt-6">
                    <button type="button" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-300 shadow-md">
                        Cập nhật mật khẩu
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(id) {
            const input = document.getElementById(id);
            const button = input.nextElementSibling; // Get the button next to the input
            const icon = button.querySelector('svg');

            if (input.type === 'password') {
                input.type = 'text';
                icon.dataset.visible = 'true';
                // Change icon to 'eye-off' (simple path change or new SVG)
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7 .566-1.89 1.705-3.533 3.33-4.78M15 12a3 3 0 11-6 0 3 3 0 016 0zm-4 4l3-3"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c.677 0 1.34.083 1.984.24M20.542 12C19.268 16.057 15.477 19 12 19c-.677 0-1.34-.083-1.984-.24M3 3l18 18"></path>';
            } else {
                input.type = 'password';
                icon.dataset.visible = 'false';
                // Change icon to 'eye' (simple path change or new SVG)
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }
    </script>
</body>
</html>
