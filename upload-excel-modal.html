<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Excel Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the drag and drop area */
        .drag-drop-area {
            transition: background-color 0.2s ease-in-out;
        }
        .drag-drop-area.hovered {
            background-color: theme('colors.gray.50'); /* Tailwind's gray-50 */
        }
    </style>
</head>
<body class="bg-gray-100 p-8">

    <!-- Button to trigger the modal for demonstration -->
    <button onclick="toggleModal(true)" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Mở Modal Nhập Excel</button>

    <!-- The Modal Component -->
    <div id="uploadExcelModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <!-- Overlay -->
        <div class="fixed inset-0 bg-black bg-opacity-50" onclick="toggleModal(false)"></div>

        <!-- Modal Content -->
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-auto relative z-10 p-6">
            <!-- Modal Header -->
            <div class="flex justify-between items-center pb-3 border-b border-gray-200">
                <h3 class="text-xl font-semibold text-gray-800">Nhập dữ liệu từ Excel</h3>
                <button type="button" class="text-gray-400 hover:text-gray-600" onclick="toggleModal(false)">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="py-4 space-y-4">
                <!-- Drag & Drop Area -->
                <div id="dragDropArea" 
                     class="drag-drop-area border-2 border-dashed border-gray-300 rounded-lg p-8 text-center transition-colors cursor-pointer"
                     ondragover="handleDragOver(event)" 
                     ondragleave="handleDragLeave(event)" 
                     ondrop="handleDrop(event)"
                     onclick="document.getElementById('excelFileInput').click()">
                    
                    <input type="file" id="excelFileInput" class="hidden" accept=".xlsx, .xls" onchange="handleFileSelect(event)">
                    
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="mt-2 text-sm text-gray-600">
                        Kéo thả file Excel vào đây hoặc <span class="font-medium text-blue-600">nhấp để chọn file</span>
                    </p>
                    <p class="text-xs text-gray-500">Chỉ chấp nhận định dạng .xlsx, .xls</p>
                </div>

                <!-- Download Sample Link -->
                <a href="#" class="text-sm text-blue-600 hover:underline block text-center">Tải xuống file Excel mẫu</a>

                <!-- Selected File Display -->
                <div id="selectedFileName" class="text-center text-sm text-gray-700 hidden">
                    File đã chọn: <span class="font-medium"></span>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200">
                <button type="button" class="px-4 py-2 rounded-md border border-gray-300 text-gray-700 hover:bg-gray-100 transition" onclick="toggleModal(false)">
                    Hủy
                </button>
                <button type="button" id="importButton" class="px-4 py-2 rounded-md bg-blue-600 text-white font-semibold opacity-50 cursor-not-allowed" disabled>
                    Tiến hành Nhập
                </button>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        function toggleModal(show) {
            const modal = document.getElementById('uploadExcelModal');
            if (show) {
                modal.classList.remove('hidden');
                resetModal();
            } else {
                modal.classList.add('hidden');
            }
        }

        function resetModal() {
            selectedFile = null;
            document.getElementById('excelFileInput').value = ''; // Clear file input
            const fileNameSpan = document.querySelector('#selectedFileName span');
            fileNameSpan.textContent = '';
            document.getElementById('selectedFileName').classList.add('hidden');
            document.getElementById('importButton').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('importButton').disabled = true;
            document.getElementById('dragDropArea').classList.remove('hovered'); // Remove hover class
        }

        function handleDragOver(event) {
            event.preventDefault(); // Prevent default to allow drop
            event.currentTarget.classList.add('hovered');
        }

        function handleDragLeave(event) {
            event.currentTarget.classList.remove('hovered');
        }

        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('hovered');
            
            if (event.dataTransfer.files.length > 0) {
                processFile(event.dataTransfer.files[0]);
            }
        }

        function handleFileSelect(event) {
            if (event.target.files.length > 0) {
                processFile(event.target.files[0]);
            }
        }

        function processFile(file) {
            const fileNameDisplay = document.getElementById('selectedFileName');
            const importButton = document.getElementById('importButton');

            // Basic file type validation
            const allowedTypes = ['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'application/vnd.ms-excel'];
            if (!allowedTypes.includes(file.type)) {
                alert('Chỉ chấp nhận file Excel (.xlsx, .xls).');
                resetModal();
                return;
            }

            selectedFile = file;
            fileNameDisplay.querySelector('span').textContent = file.name;
            fileNameDisplay.classList.remove('hidden');
            importButton.classList.remove('opacity-50', 'cursor-not-allowed');
            importButton.disabled = false;

            // Optional: Add logic to handle the import when the button is clicked
            importButton.onclick = () => {
                // Here you would typically send the `selectedFile` to your backend for processing
                alert('Tiến hành nhập file: ' + selectedFile.name);
                console.log('File to import:', selectedFile);
                toggleModal(false); // Close modal after initiating import
            };
        }
    </script>
</body>
</html>
